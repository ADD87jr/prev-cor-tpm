name: AI Studio Regression

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:
    inputs:
      run_smoke:
        description: Run API smoke flow (requires Turso secrets)
        required: false
        default: false
        type: boolean

jobs:
  ai-studio-unit:
    name: AI Studio Unit Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Ensure Rollup Linux binary
        if: runner.os == 'Linux'
        run: npm install @rollup/rollup-linux-x64-gnu --no-save

      - name: Run AI Studio unit tests
        run: npm run test:ai-studio:unit

  ai-studio-smoke:
    name: AI Studio Smoke (manual)
    if: github.event_name == 'workflow_dispatch' && inputs.run_smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      AI_STUDIO_BASE_URL: http://localhost:3001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Start app
        run: |
          npm run dev > dev.log 2>&1 &

      - name: Wait for app
        run: |
          for i in {1..90}; do
            if curl -sf http://localhost:3001 >/dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 1
          done
          echo "App did not start in time"
          tail -n 200 dev.log || true
          exit 1

      - name: Run smoke script
        shell: pwsh
        run: ./scripts/smoke-ai-studio-offer-portal.ps1

      - name: Show app log on failure
        if: failure()
        run: tail -n 300 dev.log || true

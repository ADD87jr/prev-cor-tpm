<svg viewBox="0 0 900 320" width="100%" height="320" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto;">
  <!-- Stiluri profesionale -->
  <style>
    .block { fill: #2563eb; stroke: #1e40af; stroke-width: 2; }
    .block2 { fill: #60a5fa; stroke: #2563eb; stroke-width: 2; }
    .block3 { fill: #38bdf8; stroke: #2563eb; stroke-width: 2; }
    .block4 { fill: #f59e42; stroke: #b45309; stroke-width: 2; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; fill: #fff; font-weight: bold; }
    .arrow { stroke: #22c55e; stroke-width: 5; marker-end: url(#arrowhead); }
    .desc { font-family: 'Segoe UI', Arial, sans-serif; font-size: 15px; fill: #1e293b; }
  </style>
  <!-- Blocuri -->
  <rect x="60" y="60" width="180" height="60" rx="14" class="block" />
  <text x="150" y="98" text-anchor="middle" class="label">Analiză</text>
  <text x="150" y="120" text-anchor="middle" class="desc">Procese &amp; nevoi</text>

  <rect x="340" y="30" width="180" height="60" rx="14" class="block2" />
  <text x="430" y="68" text-anchor="middle" class="label">Proiectare</text>
  <text x="430" y="90" text-anchor="middle" class="desc">Soluții tehnice</text>

  <rect x="640" y="60" width="180" height="60" rx="14" class="block3" />
  <text x="730" y="98" text-anchor="middle" class="label">Instruire</text>
  <text x="730" y="120" text-anchor="middle" class="desc">Personal &amp; know-how</text>

  <rect x="340" y="210" width="220" height="60" rx="14" class="block4" />
  <text x="450" y="248" text-anchor="middle" class="label">Implementare</text>
  <text x="450" y="270" text-anchor="middle" class="desc">Tehnologii &amp; suport</text>

  <!-- Săgeți -->
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#22c55e" />
    </marker>
  </defs>
  <line x1="240" y1="90" x2="340" y2="60" class="arrow" />
  <line x1="520" y1="60" x2="640" y2="90" class="arrow" />
  <line x1="430" y1="90" x2="430" y2="210" class="arrow" />
  <line x1="730" y1="120" x2="560" y2="210" class="arrow" />
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 312" width="820" height="312">
  <defs>
    <!-- Main gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d5a3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e4a2f;stop-opacity:1" />
    </linearGradient>
    
    <!-- Overlay pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="820" height="312" fill="url(#bgGradient)"/>
  <rect width="820" height="312" fill="url(#grid)"/>
  
  <!-- Decorative circles (representing sensors/automation) -->
  <circle cx="720" cy="80" r="60" fill="none" stroke="rgba(74,222,128,0.2)" stroke-width="2"/>
  <circle cx="720" cy="80" r="45" fill="none" stroke="rgba(74,222,128,0.3)" stroke-width="2"/>
  <circle cx="720" cy="80" r="30" fill="rgba(74,222,128,0.1)"/>
  <circle cx="720" cy="80" r="8" fill="#4ade80" filter="url(#glow)"/>
  
  <circle cx="780" cy="200" r="40" fill="none" stroke="rgba(59,130,246,0.2)" stroke-width="2"/>
  <circle cx="780" cy="200" r="25" fill="none" stroke="rgba(59,130,246,0.3)" stroke-width="2"/>
  <circle cx="780" cy="200" r="6" fill="#3b82f6" filter="url(#glow)"/>
  
  <circle cx="650" cy="250" r="35" fill="none" stroke="rgba(74,222,128,0.15)" stroke-width="2"/>
  <circle cx="650" cy="250" r="20" fill="none" stroke="rgba(74,222,128,0.25)" stroke-width="2"/>
  <circle cx="650" cy="250" r="5" fill="#4ade80" filter="url(#glow)"/>
  
  <!-- Connection lines -->
  <line x1="720" y1="80" x2="780" y2="200" stroke="rgba(74,222,128,0.3)" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="780" y1="200" x2="650" y2="250" stroke="rgba(59,130,246,0.3)" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="650" y1="250" x2="720" y2="80" stroke="rgba(74,222,128,0.2)" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Left side decorative elements -->
  <circle cx="50" cy="260" r="30" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="2"/>
  <circle cx="50" cy="260" r="15" fill="none" stroke="rgba(59,130,246,0.25)" stroke-width="2"/>
  <circle cx="50" cy="260" r="4" fill="#3b82f6" filter="url(#glow)"/>
  
  <circle cx="120" cy="50" r="25" fill="none" stroke="rgba(74,222,128,0.15)" stroke-width="2"/>
  <circle cx="120" cy="50" r="12" fill="none" stroke="rgba(74,222,128,0.25)" stroke-width="2"/>
  <circle cx="120" cy="50" r="4" fill="#4ade80" filter="url(#glow)"/>
  
  <!-- Industrial gear icon -->
  <g transform="translate(60, 130)" opacity="0.15">
    <circle cx="30" cy="30" r="20" fill="none" stroke="white" stroke-width="4"/>
    <circle cx="30" cy="30" r="8" fill="none" stroke="white" stroke-width="4"/>
    <rect x="26" y="0" width="8" height="15" fill="white"/>
    <rect x="26" y="45" width="8" height="15" fill="white"/>
    <rect x="0" y="26" width="15" height="8" fill="white"/>
    <rect x="45" y="26" width="15" height="8" fill="white"/>
  </g>
  
  <!-- Main text area with subtle background -->
  <rect x="150" y="80" width="450" height="150" rx="10" fill="rgba(0,0,0,0.2)"/>
  
  <!-- Company name -->
  <text x="375" y="145" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">
    Prev-Cor TPM
  </text>
  
  <!-- Tagline -->
  <text x="375" y="185" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="rgba(255,255,255,0.9)" text-anchor="middle">
    Soluții Inteligente de Automatizare Industrială
  </text>
  
  <!-- Accent line -->
  <rect x="275" y="200" width="200" height="3" rx="1.5" fill="#4ade80"/>
  
  <!-- Small icons representing services -->
  <g transform="translate(245, 215)" fill="rgba(255,255,255,0.6)">
    <!-- Shield icon (safety) -->
    <path d="M12 2L4 6v6c0 5.5 3.4 10.3 8 12 4.6-1.7 8-6.5 8-12V6l-8-4zm0 10h6c-.5 3.5-2.6 6.5-6 7.9V12H6V7.1l6-3v7.9z" transform="scale(0.8)"/>
  </g>
  
  <g transform="translate(365, 215)" fill="rgba(255,255,255,0.6)">
    <!-- Sensor icon -->
    <circle cx="10" cy="10" r="3" stroke-width="2"/>
    <path d="M10 0v4M10 16v4M0 10h4M16 10h4M3 3l2.8 2.8M14.2 14.2l2.8 2.8M3 17l2.8-2.8M14.2 5.8l2.8-2.8" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </g>
  
  <g transform="translate(485, 215)" fill="rgba(255,255,255,0.6)">
    <!-- Automation/gear icon -->
    <path d="M12 8a4 4 0 100 8 4 4 0 000-8zm8.9 3c-.2-1-.5-1.9-.9-2.8l1.5-1.5-1.4-1.4-1.5 1.5c-.9-.4-1.8-.7-2.8-.9V4h-2v1.9c-1 .2-1.9.5-2.8.9L9.5 5.3 8.1 6.7l1.5 1.5c-.4.9-.7 1.8-.9 2.8H7v2h1.7c.2 1 .5 1.9.9 2.8l-1.5 1.5 1.4 1.4 1.5-1.5c.9.4 1.8.7 2.8.9V20h2v-1.9c1-.2 1.9-.5 2.8-.9l1.5 1.5 1.4-1.4-1.5-1.5c.4-.9.7-1.8.9-2.8H21v-2h-2.1z" transform="scale(0.8)"/>
  </g>
</svg>
<svg viewBox="0 0 900 340" width="100%" height="340" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto;">
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e42" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#22c55e" />
    </marker>
    <style>
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; fill: #fff; font-weight: bold; }
      .desc { font-family: 'Fira Mono', 'Consolas', monospace; font-size: 15px; fill: #334155; }
      .icon-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 32px; }
    </style>
  </defs>
  <!-- Bloc Analiză cu icon lupă -->
  <rect x="60" y="60" width="180" height="60" rx="14" fill="url(#blueGrad)" stroke="#1e40af" stroke-width="2" />
  <text x="90" y="98" class="icon-label">🔍</text>
  <text x="150" y="98" text-anchor="middle" class="label">Analiză</text>
  <text x="150" y="120" text-anchor="middle" class="desc">Procese &amp; nevoi</text>

  <!-- Bloc Proiectare cu icon creion -->
  <rect x="340" y="30" width="180" height="60" rx="14" fill="url(#blueGrad)" stroke="#1e40af" stroke-width="2" />
  <text x="370" y="68" class="icon-label">✏️</text>
  <text x="430" y="68" text-anchor="middle" class="label">Proiectare</text>
  <text x="430" y="90" text-anchor="middle" class="desc">Soluții tehnice</text>

  <!-- Bloc Instruire cu icon carte -->
  <rect x="640" y="60" width="180" height="60" rx="14" fill="url(#blueGrad)" stroke="#1e40af" stroke-width="2" />
  <text x="670" y="98" class="icon-label">📘</text>
  <text x="730" y="98" text-anchor="middle" class="label">Instruire</text>
  <text x="730" y="120" text-anchor="middle" class="desc">Personal &amp; know-how</text>

  <!-- Bloc Implementare cu icon roată dințată -->
  <rect x="340" y="210" width="220" height="60" rx="14" fill="url(#orangeGrad)" stroke="#b45309" stroke-width="2" />
  <text x="370" y="248" class="icon-label">⚙️</text>
  <text x="450" y="248" text-anchor="middle" class="label">Implementare</text>
  <text x="450" y="270" text-anchor="middle" class="desc">Tehnologii &amp; suport</text>

  <!-- Săgeți subțiri -->
  <line x1="240" y1="90" x2="340" y2="60" stroke="#22c55e" stroke-width="3" marker-end="url(#arrowhead)" />
  <line x1="520" y1="60" x2="640" y2="90" stroke="#22c55e" stroke-width="3" marker-end="url(#arrowhead)" />
  <line x1="430" y1="90" x2="430" y2="210" stroke="#22c55e" stroke-width="3" marker-end="url(#arrowhead)" />
  <line x1="730" y1="120" x2="560" y2="210" stroke="#22c55e" stroke-width="3" marker-end="url(#arrowhead)" />

  <!-- Simboluri industriale suplimentare -->
  <!-- Simbol PLC -->
  <rect x="600" y="160" width="40" height="24" rx="4" fill="#fff" stroke="#2563eb" stroke-width="2" />
  <text x="620" y="178" text-anchor="middle" class="desc" font-size="13">PLC</text>
  <!-- Simbol senzor -->
  <circle cx="200" cy="200" r="14" fill="#fff" stroke="#2563eb" stroke-width="2" />
  <text x="200" y="205" text-anchor="middle" class="desc" font-size="13">S</text>
  <!-- Simbol motor -->
  <circle cx="800" cy="200" r="14" fill="#fff" stroke="#f59e42" stroke-width="2" />
  <text x="800" y="205" text-anchor="middle" class="desc" font-size="13">M</text>
</svg>
